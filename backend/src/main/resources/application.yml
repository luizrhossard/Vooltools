spring:
  application:
    name: loja-ferramentas-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loja_ferramentas}
    username: ${DB_USER:tools_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  security:
    order-rate-limit:
      enabled: ${ORDER_RATE_LIMIT_ENABLED:true}
      capacity: ${ORDER_RATE_LIMIT_CAPACITY:10}
      refill-tokens: ${ORDER_RATE_LIMIT_REFILL_TOKENS:10}
      refill-minutes: ${ORDER_RATE_LIMIT_REFILL_MINUTES:1}
